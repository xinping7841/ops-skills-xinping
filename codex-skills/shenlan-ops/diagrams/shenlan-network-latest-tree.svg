<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1700" viewBox="0 0 2400 1700" font-family="Menlo, Consolas, 'SF Mono', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <style>
      .bg{fill:#f8fafc}.title{font-size:44px;font-weight:800;fill:#0f172a}.sub{font-size:22px;fill:#475569}.line{stroke:#334155;stroke-width:4;fill:none}.thin{stroke-width:3}.trunk{stroke:#2563eb;stroke-width:5}.box{fill:#fff;stroke:#334155;stroke-width:3;rx:16}.wan{fill:#e0f2fe;stroke:#0284c7}.router{fill:#dcfce7;stroke:#16a34a}.core{fill:#fef9c3;stroke:#ca8a04}.access{fill:#e0e7ff;stroke:#4f46e5}.vlan{fill:#f8fafc;stroke:#64748b}.svc{fill:#ccfbf1;stroke:#0d9488}.nas{fill:#fef3c7;stroke:#d97706}.todo{fill:#ffedd5;stroke:#ea580c}.h{font-size:25px;font-weight:800;fill:#111827}.t{font-size:20px;fill:#1f2937}.s{font-size:17px;fill:#475569}.small{font-size:15px;fill:#64748b}.tag{font-size:16px;font-weight:700;fill:#1d4ed8}.warn{font-size:16px;font-weight:700;fill:#b45309}
    </style>
  </defs>
  <rect class="bg" width="2400" height="1700"/>
  <text x="1200" y="70" text-anchor="middle" class="title">深澜网络结构图（最新型号补全版）</text>
  <text x="1200" y="110" text-anchor="middle" class="sub">横向树状骨架：出口 → OpenWrt → H3C 核心 → 汇聚 / AC / VLAN / 业务设备</text>

  <!-- WAN / upstream -->
  <rect x="90" y="165" width="330" height="125" class="box wan"/>
  <text x="255" y="205" text-anchor="middle" class="h">电信光猫</text>
  <text x="255" y="238" text-anchor="middle" class="t">B866-S2 · 路由模式</text>
  <text x="255" y="268" text-anchor="middle" class="small">LAN1 → SDWAN；LAN2 → OpenWrt WAN2</text>

  <rect x="560" y="120" width="320" height="95" class="box wan"/>
  <text x="720" y="158" text-anchor="middle" class="h">SDWAN</text>
  <text x="720" y="190" text-anchor="middle" class="t">OSDWAN</text>

  <rect x="1010" y="165" width="380" height="125" class="box router"/>
  <text x="1200" y="205" text-anchor="middle" class="h">OpenWrt 主路由</text>
  <text x="1200" y="238" text-anchor="middle" class="t">192.168.99.3 · 倍控 H30S</text>
  <text x="1200" y="268" text-anchor="middle" class="small">出口 / NAT / DNS / QoS / 策略路由</text>

  <path d="M420 205 H560" class="line"/>
  <text x="490" y="190" text-anchor="middle" class="tag">LAN1</text>
  <path d="M880 168 H1010" class="line"/>
  <text x="945" y="153" text-anchor="middle" class="tag">WAN1</text>
  <path d="M420 250 C610 360 825 360 1010 250" class="line thin"/>
  <text x="705" y="355" text-anchor="middle" class="tag">LAN2 → WAN2</text>

  <!-- core -->
  <rect x="935" y="420" width="530" height="135" class="box core"/>
  <text x="1200" y="462" text-anchor="middle" class="h">H3C 核心三层交换机</text>
  <text x="1200" y="496" text-anchor="middle" class="t">192.168.99.1 · H3C S5130V2-28S-LI</text>
  <text x="1200" y="526" text-anchor="middle" class="small">所有业务 VLAN 网关 + DHCP</text>
  <path d="M1200 290 V420" class="line"/>
  <text x="1248" y="365" class="tag">LAN</text>

  <!-- branch spine -->
  <path d="M1200 555 V1510" class="line"/>

  <!-- S5735 branch -->
  <path d="M1200 650 H1525" class="trunk"/>
  <rect x="1525" y="585" width="790" height="145" class="box access"/>
  <text x="1920" y="625" text-anchor="middle" class="h">S5735S 汇聚 / 办公接入</text>
  <text x="1920" y="658" text-anchor="middle" class="t">Huawei S5735S-L24T4S-QA2 · 192.168.99.2</text>
  <text x="1920" y="688" text-anchor="middle" class="small">H3C Te1/0/28 Trunk ↔ S5735S Gi0/0/25 · VLAN 1,10,16-18,99</text>
  <text x="1920" y="715" text-anchor="middle" class="small">VLAN10 办公 / VLAN16 市场 / VLAN17 教培 / VLAN18 AI开发 / VLAN99 管理</text>

  <!-- ER/AP branch -->
  <path d="M1200 805 H1525" class="trunk"/>
  <rect x="1525" y="755" width="790" height="170" class="box access"/>
  <text x="1920" y="795" text-anchor="middle" class="h">ER5200G3 AC / MiniAP 管理器</text>
  <text x="1920" y="828" text-anchor="middle" class="t">H3C ERG3 / ER5200G3 · 192.168.99.4</text>
  <text x="1920" y="858" text-anchor="middle" class="small">H3C GE1/0/12 Trunk · AC 管理，不是核心/网关/主路由</text>
  <text x="1920" y="888" text-anchor="middle" class="small">AP：7 × H3C A61-1500 · 版本 SWBA1A1V100R005 · IP 172.17.1.2-172.17.1.8</text>
  <text x="1920" y="914" text-anchor="middle" class="small">VLAN20 AP管理 / VLAN60 无线业务 / VLAN99 AC管理</text>

  <!-- VLAN30 -->
  <path d="M1200 985 H1525" class="line"/>
  <rect x="1525" y="955" width="790" height="115" class="box nas"/>
  <text x="1920" y="993" text-anchor="middle" class="h">VLAN30 · NAS / 中枢网关 · GW 192.168.30.1/24</text>
  <text x="1920" y="1026" text-anchor="middle" class="t">GE1/0/7：小米中枢网关 ZSWG01CM（当前 100M）</text>
  <text x="1920" y="1055" text-anchor="middle" class="t">Te1/0/27：QNAP TS-h973AX-8G（10G，已复核）</text>

  <!-- VLAN40 -->
  <path d="M1200 1130 H1525" class="line"/>
  <rect x="1525" y="1100" width="790" height="105" class="box vlan"/>
  <text x="1920" y="1138" text-anchor="middle" class="h">VLAN40 · 监控网络 · GW 192.168.40.1/24</text>
  <text x="1920" y="1172" text-anchor="middle" class="t">H3C GE1/0/5、GE1/0/6 · 海康威视 NVR DS-7932N-R4(C) · 192.168.40.168</text>

  <!-- VLAN50 -->
  <path d="M1200 1285 H1525" class="line"/>
  <rect x="1525" y="1240" width="790" height="155" class="box svc"/>
  <text x="1920" y="1278" text-anchor="middle" class="h">VLAN50 · 展厅 / 服务器 / 中控 / 下挂交换机集合 · GW 192.168.50.1/23</text>
  <text x="1920" y="1312" text-anchor="middle" class="t">192.168.50.120 展厅中控 / 时钟源 · 192.168.50.121 node-121（AZW SER / AMD 零刻）</text>
  <text x="1920" y="1342" text-anchor="middle" class="t">192.168.50.254 飞牛OS NAS（组装 NAS）</text>
  <text x="1920" y="1372" text-anchor="middle" class="small">下挂候选：TL-SG2024MP / YLS220P-5G1F / TL-ST2008 / FutureMatrix · 位置待确认</text>

  <!-- Other VLANs -->
  <path d="M1200 1460 H1525" class="line"/>
  <rect x="1525" y="1430" width="790" height="150" class="box vlan"/>
  <text x="1920" y="1468" text-anchor="middle" class="h">H3C 其他直连业务 VLAN</text>
  <text x="1920" y="1502" text-anchor="middle" class="t">VLAN19 接待厅 GE1/0/19 · VLAN70 工作坊 GE1/0/17 · VLAN80 2号展厅 GE1/0/18</text>
  <text x="1920" y="1532" text-anchor="middle" class="t">VLAN90 XR影棚 Te1/0/26 10G · VLAN120 临时口 · VLAN201 光猫/预留业务</text>
  <text x="1920" y="1562" text-anchor="middle" class="small">VLAN99 管理网：H3C 99.1 / S5735S 99.2 / OpenWrt 99.3 / ER5200G3 99.4</text>

  <!-- left labels -->
  <rect x="105" y="620" width="520" height="750" class="box todo"/>
  <text x="365" y="660" text-anchor="middle" class="h">仍待现场补充</text>
  <text x="140" y="710" class="t">• 飞牛OS NAS：接入交换机端口</text>
  <text x="140" y="750" class="t">• 小米 ZSWG01CM：MAC、IP</text>
  <text x="140" y="790" class="t">• 海康 NVR：接入口</text>
  <text x="140" y="830" class="t">• AP：每台安装位置、上联端口</text>
  <text x="140" y="870" class="t">• B866-S2 / OSDWAN：管理地址、端口映射</text>
  <text x="140" y="910" class="t">• VLAN50 下挂交换机：位置、完整型号、上联端口</text>
  <text x="140" y="970" class="warn">说明：S5735S 下属 VLAN10/16/17/18 不与 H3C 直连 VLAN 混层。</text>
  <text x="140" y="1010" class="warn">ER5200G3 仅作 AC / MiniAP 管理器。</text>
</svg>
